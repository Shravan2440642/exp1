<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — WebChat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25;
    --text: #e0e0e8; --muted: #6a6a7a; --accent: #7b6cf6;
    --accent2: #5a4fd4; --border: #2a2a38; --danger: #e24b4a;
    --success: #5DCAA5; --system: #EF9F27;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2);
  }
  .header-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--danger); transition: background .3s;
  }
  .header-dot.online { background: var(--success); }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-status {
    font-size: 12px; color: var(--muted); margin-left: auto;
  }

  /* ── Messages ── */
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.5; white-space: pre-wrap;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }
  .msg-user {
    align-self: flex-end; background: var(--accent2); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg-assistant {
    align-self: flex-start; background: var(--bg3);
    border-bottom-left-radius: 4px;
  }
  .msg-system {
    align-self: center; background: transparent;
    color: var(--system); font-size: 12px; text-align: center;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 16px;
  }
  .msg-error {
    align-self: center; color: var(--danger); font-size: 12px;
    text-align: center;
  }
  .msg-tokens {
    font-size: 11px; color: var(--muted); margin-top: 4px;
    text-align: right;
  }

  /* ── Typing indicator ── */
  .typing {
    align-self: flex-start; padding: 12px 16px;
    background: var(--bg3); border-radius: 12px;
    display: none; gap: 4px; align-items: center;
  }
  .typing.active { display: flex; }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); animation: pulse 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Input ── */
  .input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--bg2); display: flex; gap: 10px;
  }
  .input-area input {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .input-area input:focus { border-color: var(--accent); }
  .input-area input::placeholder { color: var(--muted); }
  .input-area button {
    padding: 10px 20px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-size: 14px;
    font-weight: 500; cursor: pointer; transition: background .2s;
  }
  .input-area button:hover { background: var(--accent2); }
  .input-area button:disabled {
    background: var(--border); cursor: not-allowed;
  }

  /* ── Status bar ── */
  .status-bar {
    padding: 6px 20px; font-size: 11px; color: var(--muted);
    background: var(--bg); border-top: 1px solid var(--border);
    display: flex; gap: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-dot" id="statusDot"></div>
  <h1>Jarvis</h1>
  <span class="header-status" id="headerStatus">Connecting...</span>
</div>

<div class="messages" id="messages">
  <div class="typing" id="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="Message Jarvis..." autocomplete="off" />
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<div class="status-bar">
  <span id="wsStatus">Disconnected</span>
  <span id="sessionInfo"></span>
  <span id="tokenInfo"></span>
</div>

<script>
const WS_URL = 'ws://127.0.0.1:18789';
const PEER_ID = 'webchat-' + Math.random().toString(36).slice(2, 8);

let ws = null;
let reconnectTimer = null;
let totalTokens = { input: 0, output: 0 };

const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const typingEl = $('typing');

// ── WebSocket connection ──

function connect() {
  $('headerStatus').textContent = 'Connecting...';
  $('wsStatus').textContent = 'Connecting...';

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    $('statusDot').classList.add('online');
    $('headerStatus').textContent = 'Online';
    $('wsStatus').textContent = `Connected to ${WS_URL}`;
    $('sendBtn').disabled = false;
    inputEl.disabled = false;
    inputEl.focus();

    // register with gateway
    ws.send(JSON.stringify({
      type: 'status',
      peer_id: PEER_ID,
    }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    $('statusDot').classList.remove('online');
    $('headerStatus').textContent = 'Disconnected';
    $('wsStatus').textContent = 'Disconnected — reconnecting in 3s...';
    $('sendBtn').disabled = true;
    typingEl.classList.remove('active');

    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    addMessage('system', 'Connection error. Is the gateway running?');
  };
}

// ── Handle incoming messages ──

function handleMessage(data) {
  typingEl.classList.remove('active');

  switch (data.type) {
    case 'response':
      addMessage('assistant', data.text);
      if (data.tokens) {
        totalTokens.input += data.tokens.input;
        totalTokens.output += data.tokens.output;
        $('tokenInfo').textContent =
          `Tokens: ${totalTokens.input} in / ${totalTokens.output} out`;
      }
      if (data.session_id) {
        $('sessionInfo').textContent = `Session: ${data.session_id}`;
      }
      break;

    case 'system':
      addMessage('system', data.text);
      break;

    case 'status':
      $('sessionInfo').textContent = `Session: ${data.session_id}`;
      addMessage('system',
        `Model: ${data.model} | Messages: ${data.messages} | Uptime: ${data.uptime_seconds}s`
      );
      break;

    case 'typing':
      typingEl.classList.add('active');
      messagesEl.scrollTop = messagesEl.scrollHeight;
      break;

    case 'error':
      addMessage('error', data.text);
      break;

    case 'pong':
      break;
  }
}

// ── UI helpers ──

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  messagesEl.insertBefore(div, typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function send() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  // show user message immediately
  addMessage('user', text);
  inputEl.value = '';

  // detect commands
  if (text.startsWith('/')) {
    ws.send(JSON.stringify({
      type: 'command',
      command: text,
      peer_id: PEER_ID,
    }));
  } else {
    ws.send(JSON.stringify({
      type: 'message',
      text: text,
      peer_id: PEER_ID,
    }));
  }
}

// ── Keyboard shortcut ──

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// ── Start ──

connect();
</script>
</body>
</html>
